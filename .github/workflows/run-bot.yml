name: Check Runner Specs

on:
  workflow_dispatch: # Allows you to manually click "Run" from the Actions tab

jobs:
  verify-hardware:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Code
        uses: actions/checkout@v4

      - name: System Hardware Breakdown
        run: |
          echo "========================================="
          echo "         ⚙️ HARDWARE SPECIFICATIONS       "
          echo "========================================="
          
          echo "➜ Total CPU Cores (Logical):"
          nproc
          
          echo -e "\n➜ Detailed CPU Model Info:"
          lscpu | grep "Model name\|Core(s) per socket\|Thread(s) per core\|CPU(s):"
          
          echo -e "\n➜ System RAM (Memory) Capacity:"
          free -h
          
          echo -e "\n➜ Operating System Version:"
          lsb_release -a 2>/dev/null || cat /etc/os-release | grep PRETTY_NAME
          
          echo "========================================="
